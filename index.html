<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TXT to PDF Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary-color: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --container-bg: #FFFFFF;
            --text-color: #1F2937;
            --border-color: #D1D5DB;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            text-align: center;
            color: var(--primary-color);
        }

        .upload-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            text-align: center;
        }

        input[type="file"] {
            display: none;
        }

        .file-label {
            background-color: #E5E7EB;
            color: var(--text-color);
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
            display: inline-block;
        }

        .file-label:hover {
            background-color: #D1D5DB;
        }

        .file-name {
            font-size: 0.875rem;
            color: #6B7280;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        button.convert-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button.convert-btn:hover {
            background-color: var(--primary-hover);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>TXT to PDF Converter</h1>
        
        <div class="upload-section">
            <label for="fileInput" class="file-label">Choose a .txt file</label>
            <input type="file" id="fileInput" accept=".txt">
            <span class="file-name" id="fileName">Or paste your text below</span>
        </div>

        <textarea id="textInput" placeholder="Enter or paste your text here..."></textarea>

        <button class="convert-btn" id="generatePdfBtn">Download PDF</button>
    </div>

    <script>
        // Extract jsPDF from the window object loaded by the CDN
        const { jsPDF } = window.jspdf;

        const fileInput = document.getElementById('fileInput');
        const textInput = document.getElementById('textInput');
        const fileNameDisplay = document.getElementById('fileName');
        const generatePdfBtn = document.getElementById('generatePdfBtn');

        // Handle File Upload
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                fileNameDisplay.textContent = file.name;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    textInput.value = event.target.result;
                };
                reader.readAsText(file);
            } else {
                fileNameDisplay.textContent = "Or paste your text below";
            }
        });

        // Handle PDF Generation
        generatePdfBtn.addEventListener('click', function() {
            const text = textInput.value;
            
            if (!text.trim()) {
                alert('Please enter some text or upload a .txt file first.');
                return;
            }

            // Initialize a new PDF document
            const doc = new jsPDF();
            
            // Layout settings
            const margin = 15; // standard margin
            const pageWidth = doc.internal.pageSize.width;
            const pageHeight = doc.internal.pageSize.height;
            const maxLineWidth = pageWidth - (margin * 2);
            
            // Split text automatically to fit the width of the page
            const splitText = doc.splitTextToSize(text, maxLineWidth);
            
            let cursorY = margin; // Vertical starting position
            const lineHeight = 7; // Spacing between lines

            // Loop through each line of text and add pages dynamically if it overflows
            splitText.forEach(line => {
                // If the next line exceeds the page height, create a new page
                if (cursorY + lineHeight > pageHeight - margin) {
                    doc.addPage();
                    cursorY = margin; // Reset vertical cursor for the new page
                }
                doc.text(line, margin, cursorY);
                cursorY += lineHeight;
            });

            // Trigger the download
            doc.save('converted_document.pdf');
        });
    </script>
</body>
</html>
